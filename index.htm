<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lake Brush Pile Logger</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
body{background:#f5f7fb}
.app-shell{max-width:720px;margin:auto;padding:1rem}
.card-soft{border:0;border-radius:1.25rem;box-shadow:0 .5rem 1.5rem rgba(0,0,0,.08)}
.big-btn{min-height:56px;font-size:1.05rem;border-radius:.9rem}
.hidden{display:none!important}
.coord-box{background:#f8f9fa;border-radius:1rem;padding:1rem;font-family:monospace}
.spinner-big{width:3rem;height:3rem}
</style>
</head>
<body>

<div class="app-shell">

<div class="text-center mb-4">
<h1 class="h3 fw-bold">Lake Brush Pile Logger</h1>
<p class="text-secondary">High accuracy GPS logging</p>
</div>

<div id="alertArea"></div>

<section id="pageSetup" class="card card-soft p-4">
<h4>Trip details</h4>

<div class="mb-3">
<label class="form-label">Lake name</label>
<input id="lakeName" class="form-control" type="text">
</div>

<div class="mb-3">
<label class="form-label">Date</label>
<input id="surveyDate" class="form-control" type="date">
</div>

<h5>What type of structure is being placed?</h5>

<select id="structureType" class="form-select mb-3">
<option value="">Choose one</option>
<option value="Cedar Tree">Cedar tree</option>
<option value="Artificial Habitat">Artificial habitat</option>
<option value="__custom__">Type your own</option>
</select>

<input id="customType" class="form-control mb-3 hidden" placeholder="Enter custom type">

<button id="startBtn" class="btn btn-primary big-btn w-100">Start logging</button>
</section>

<section id="pageLocation" class="card card-soft p-4 hidden">

<h4 class="mb-3">Capture Location</h4>

<div class="coord-box mb-3">
<div><b>Latitude:</b> <span id="latValue">-</span></div>
<div><b>Longitude:</b> <span id="lngValue">-</span></div>
<div><b>Accuracy:</b> <span id="accuracyValue">-</span></div>
</div>

<div id="accuracyNote" class="text-secondary small mb-3">
Waiting for GPS fix under <b>5 meters</b> accuracy
</div>

<div id="spinnerWrap" class="text-center mb-3 hidden">
<div class="spinner-border spinner-big text-primary"></div>
<div class="mt-2 small">Improving GPS accuracy...</div>
</div>

<button id="captureBtn" class="btn btn-success big-btn w-100 mb-3">
Log location (auto waits for <5m accuracy)
</button>

<button id="doneBtn" class="btn btn-primary big-btn w-100">Done collecting</button>

</section>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

const REQUIRED_ACCURACY = 5

const state={lakeName:'',surveyDate:'',currentType:'',points:[]}

const els={
pageSetup:document.getElementById('pageSetup'),
pageLocation:document.getElementById('pageLocation'),
lakeName:document.getElementById('lakeName'),
surveyDate:document.getElementById('surveyDate'),
structureType:document.getElementById('structureType'),
customType:document.getElementById('customType'),
startBtn:document.getElementById('startBtn'),
latValue:document.getElementById('latValue'),
lngValue:document.getElementById('lngValue'),
accuracyValue:document.getElementById('accuracyValue'),
accuracyNote:document.getElementById('accuracyNote'),
spinnerWrap:document.getElementById('spinnerWrap'),
captureBtn:document.getElementById('captureBtn'),
doneBtn:document.getElementById('doneBtn'),
alertArea:document.getElementById('alertArea')
}

function alertMsg(msg,type='warning'){
els.alertArea.innerHTML=`<div class="alert alert-${type}">${msg}</div>`
}

function showPage(p){
els.pageSetup.classList.add('hidden')
els.pageLocation.classList.add('hidden')
if(p==='location') els.pageLocation.classList.remove('hidden')
if(p==='setup') els.pageSetup.classList.remove('hidden')
}

els.structureType.addEventListener('change',()=>{
els.customType.classList.toggle('hidden',els.structureType.value!=='__custom__')
})

els.startBtn.onclick=()=>{

const lake=els.lakeName.value.trim()
let type=els.structureType.value

if(type==='__custom__') type=els.customType.value.trim()

if(!lake||!type){alertMsg('Enter lake and structure type');return}

state.lakeName=lake
state.currentType=type
state.surveyDate=els.surveyDate.value

showPage('location')
}

els.captureBtn.onclick=()=>{

if(!navigator.geolocation){alertMsg('Geolocation not supported','danger');return}

els.spinnerWrap.classList.remove('hidden')
els.captureBtn.disabled=true

let watchId

watchId=navigator.geolocation.watchPosition(pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude
const acc=pos.coords.accuracy

els.latValue.textContent=lat.toFixed(6)
els.lngValue.textContent=lng.toFixed(6)
els.accuracyValue.textContent=acc.toFixed(2)+' meters'

if(acc<=REQUIRED_ACCURACY){

navigator.geolocation.clearWatch(watchId)

state.points.push({
latitude:lat,
longitude:lng,
accuracy:acc,
habitatType:state.currentType,
timestamp:new Date().toISOString()
})

els.spinnerWrap.classList.add('hidden')
els.captureBtn.disabled=false

alertMsg('Point saved with '+acc.toFixed(2)+'m accuracy','success')
}

},err=>{
alertMsg('GPS error','danger')
els.spinnerWrap.classList.add('hidden')
els.captureBtn.disabled=false
},{enableHighAccuracy:true,maximumAge:0,timeout:20000})
}

function buildCSV(){

let rows=[['Lake','Date','Habitat','Latitude','Longitude','Accuracy(m)']]

state.points.forEach(p=>{
rows.push([
state.lakeName,
state.surveyDate,
p.habitatType,
p.latitude,
p.longitude,
p.accuracy
])
})

return rows.map(r=>r.join(',')).join('\n')
}

els.doneBtn.onclick=()=>{

if(!state.points.length){alertMsg('No points collected');return}

const csv=buildCSV()

const blob=new Blob([csv],{type:'text/csv'})

const a=document.createElement('a')
a.href=URL.createObjectURL(blob)
a.download='brush_piles_'+state.lakeName+'.csv'
a.click()

const subject=`Brush pile log ${state.lakeName} ${state.surveyDate}`

window.location.href=`mailto:jehnsen.lebsock@nebraska.gov?subject=${encodeURIComponent(subject)}`
}

</script>
</body>
</html>
